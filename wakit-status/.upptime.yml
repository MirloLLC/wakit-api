owner: MirloLLC
repo: wakit-status

sites:
  - name: Dashboard
    url: https://app.wakit.ai
    icon: https://app.wakit.ai/favicon.svg

  - name: API
    url: https://api.wakit.ai/functions/v1/api/ping
    icon: https://app.wakit.ai/favicon.svg

  - name: Auth
    url: https://api.wakit.ai/auth/v1/health
    icon: https://app.wakit.ai/favicon.svg

  - name: Meta WhatsApp API
    url: https://graph.facebook.com/v24.0/
    expectedStatusCodes:
      - 400

  - name: Documentation
    url: https://docs.wakit.ai
    icon: https://app.wakit.ai/favicon.svg

status-website:
  cname: status.wakit.ai
  name: wakit status
  introTitle: "**wakit** platform status"
  introMessage: Current status and uptime for wakit services. [Learn more about wakit](https://wakit.ai).
  navbar:
    - title: wakit
      href: https://wakit.ai
    - title: Dashboard
      href: https://app.wakit.ai
    - title: Docs
      href: https://docs.wakit.ai
    - title: GitHub
      href: https://github.com/MirloLLC/wakit-status
  theme: light

workflowSchedule:
  graphs: "0 0 * * *"
  responseTime: "0 23 * * *"
  staticSite: "0 1 * * *"
  summary: "0 0 * * *"
  updateTemplate: "0 0 * * *"
  uptime: "*/5 * * * *"

i18n:
  activeIncidents: Active incidents
  allSystemsOperational: All systems operational
  incidentReport: "Incident report for $SITE_NAME"
  activeIncidentSummary: "Opened $DATE"
  incidentFixed: Fixed
  incidentOngoing: Ongoing
  incidentDetails: Incident details
  uptimeHistory: Uptime history
  responseTimeHistory: Response time history
  liveStatus: Live status
  overallUptime: "Overall uptime: $UPTIME"
